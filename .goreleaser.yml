# GoReleaser configuration
version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/bazel-mcp-server
    id: bazel-mcp-server
    binary: bazel-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: yourusername
    name: bazel-mcp-server
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## Bazel MCP Server {{.Version}}
    
    A Model Context Protocol server for Bazel build system integration.
  footer: |
    ## Installation
    
    Download the appropriate binary for your platform and add it to your PATH.
    
    ### Quick Install
    
    ```bash
    # macOS or Linux
    curl -L https://github.com/yourusername/bazel-mcp-server/releases/download/{{.Tag}}/bazel-mcp-server_{{.Version}}_{{.Os}}_{{.Arch}}.tar.gz | tar xz
    sudo mv bazel-mcp-server /usr/local/bin/
    
    # Or with Go
    go install github.com/yourusername/bazel-mcp-server/cmd/bazel-mcp-server@{{.Tag}}
    ```
